# tex-server — PDF viewer + Socket.IO (ports 7771-7777)

# Socket.IO for Vim/editor clients -> master instance
location /socket.io/ {
    proxy_pass http://127.0.0.1:7777/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400s;
}

# PDF viewer: workspace-aware routing
# /w/<workspace>/... -> localhost:<port>/...
# Workspace-to-port mapping defined in nginx-http.conf (map block)
location ~ ^/w/(?P<tex_workspace>[^/]+)/(?P<tex_rest>.*)$ {
    proxy_pass http://127.0.0.1:$tex_port/$tex_rest$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
    proxy_redirect / /w/$tex_workspace/;
}
